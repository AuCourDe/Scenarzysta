<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Generujący Scenariusze Testowe</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>System Generujący Scenariusze Testowe</h1>
            <div class="user-info">
                <span id="user-id-display">ID Użytkownika: <strong id="current-user-id">-</strong></span>
                <button id="new-user-btn" class="btn btn-secondary">Nowy użytkownik</button>
            </div>
        </header>

        <main>
            <!-- Sekcja przesyłania plików -->
            <section class="upload-section">
                <h2>Prześlij dokument</h2>
                <form id="upload-form">
                    <div class="file-input-wrapper">
                        <input type="file" id="file-input" name="file" accept=".docx" required>
                        <label for="file-input" class="file-label">
                            <span class="file-label-text">Wybierz plik .docx</span>
                        </label>
                    </div>
                    <button type="submit" class="btn btn-primary" id="upload-btn">
                        Prześlij i przetwórz
                    </button>
                </form>
            </section>

            <!-- Sekcja kolejki zadań -->
            <section class="queue-section">
                <h2>Kolejka zadań</h2>
                <div class="queue-stats">
                    <div class="stat-item">
                        <span class="stat-label">Zadania w kolejce:</span>
                        <span class="stat-value" id="pending-count">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Aktualnie przetwarzane:</span>
                        <span class="stat-value" id="processing-count">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Szacowany czas oczekiwania:</span>
                        <span class="stat-value" id="wait-time">-</span>
                    </div>
                </div>

                <div class="tasks-list" id="tasks-list">
                    <p class="no-tasks">Brak zadań w kolejce</p>
                </div>
            </section>
        </main>
    </div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
